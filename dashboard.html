<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sapiom Spend — CEO Dashboard</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131722;
    --panel-border: #232a3b;
    --text: #e6e9f0;
    --muted: #8a92a6;
    --green: #35d07f;
    --red: #ff5c5c;
    --amber: #ffb454;
    --blue: #5b8ff9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 32px;
  }
  h1 { font-size: 22px; margin: 0 0 4px 0; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .row-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin: 22px 0 8px 2px; }
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
  }
  .tile {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 22px 24px;
  }
  .tile.hero { padding: 26px 26px 22px; }
  .tile h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .big-number { font-size: 40px; font-weight: 700; line-height: 1.05; cursor: default; }
  .hero .big-number { font-size: 56px; }
  .big-number.green { color: var(--green); }
  .big-number.red { color: var(--red); }
  .big-number.amber { color: var(--amber); }
  .subline { color: var(--text); font-size: 14px; margin-top: 10px; opacity: 0.85; }
  .scale-note { font-size: 12.5px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--panel-border); line-height: 1.5; cursor: help; }
  .scale-note.amber { color: var(--amber); }
  .scale-note.blue { color: var(--blue); }
  .caption { color: var(--muted); font-size: 12.5px; margin-top: 8px; line-height: 1.5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th, td { text-align: left; padding: 5px 6px; border-bottom: 1px solid var(--panel-border); }
  th { color: var(--muted); font-weight: 500; }
  tr.flag-red td { color: var(--red); font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    vertical-align: middle;
  }
  .badge.green { background: rgba(53,208,127,0.15); color: var(--green); }
  .badge.red { background: rgba(255,92,92,0.15); color: var(--red); }
  .footer { margin-top: 28px; color: var(--muted); font-size: 12px; }
  .error { color: var(--red); }
</style>
</head>
<body>

<h1>Sapiom Spend — CEO Dashboard</h1>
<div class="subtitle" id="subtitle">Loading...</div>

<div class="row-label">Hero KPIs</div>
<div class="hero-grid" id="hero-grid"></div>

<div class="row-label">Detail</div>
<div class="grid" id="grid"></div>

<div class="footer" id="footer"></div>

<!-- Same-directory <script src>, not fetch(): a fetch() of a local JSON file
     is blocked by CORS when this page is opened directly via file:// in
     Chrome. A plain <script src> has no such restriction, so this dashboard
     opens correctly with a simple double-click, no local server needed, and
     works unchanged when served from GitHub Pages. -->
<script src="dashboard_data.js"></script>
<script>
(function () {
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };
  const usd = (n, d = 6) => (n === null || n === undefined) ? 'n/a' : `$${Number(n).toFixed(d)}`;
  const usd2 = (n) => usd(n, 2);
  const pct = (n, d = 1) => (n === null || n === undefined) ? 'n/a' : `${Number(n) >= 0 ? '+' : ''}${Number(n).toFixed(d)}%`;
  const fmtMs = (ms) => (ms === null || ms === undefined) ? 'n/a' : (Math.abs(ms) < 1000 ? `${ms.toFixed(0)}ms` : `${(ms / 1000).toFixed(2)}s`);

  const heroGrid = document.getElementById('hero-grid');
  const grid = document.getElementById('grid');
  const subtitle = document.getElementById('subtitle');
  const footer = document.getElementById('footer');

  const data = window.DASHBOARD_DATA;
  if (!data) {
    subtitle.textContent = '';
    heroGrid.appendChild(el('div', 'tile hero error',
      '<h2>Load error</h2><div class="big-number red">n/a</div>' +
      '<div class="caption">dashboard_data.js did not load. Run export_dashboard.py from the repo root, ' +
      'then reopen dashboard.html from the same directory.</div>'));
    return;
  }

  const h = data.header || {};
  const genDate = (data.generated_at || '').slice(0, 10);
  subtitle.textContent = `${h.n_txns} txns · ${h.n_agents} agents · generated ${genDate}`;
  subtitle.title = `Period: ${h.period_start} -> ${h.period_end}`;

  // ---- Hero 1: TPV --------------------------------------------------------
  (function heroTpv() {
    const t = data.hero_tpv || {};
    const tile = el('div', 'tile hero');
    tile.appendChild(el('h2', null, 'TPV — Total Payment Volume'));
    tile.appendChild(el('div', 'big-number', usd(t.value_usd, 6)));
    tile.appendChild(el('div', 'subline', t.subline || ''));
    const note = el('div', 'scale-note blue', t.scale_note || '');
    note.title = t.method_note || '';
    tile.appendChild(note);
    heroGrid.appendChild(tile);
  })();

  // ---- Hero 2: Capture ratio -----------------------------------------------
  (function heroCapture() {
    const t = data.hero_capture_ratio || {};
    const tile = el('div', 'tile hero');
    tile.appendChild(el('h2', null, 'Capture Ratio'));
    const v = t.ratio_pct;
    const cls = v === null || v === undefined ? '' : (v < 50 ? 'red' : v < 80 ? 'amber' : 'green');
    tile.appendChild(el('div', `big-number ${cls}`, v === null ? 'n/a' : `${v.toFixed(1)}%`));
    tile.appendChild(el('div', 'subline', t.subline || ''));
    const note = el('div', 'scale-note amber', t.scale_note || '');
    note.title = t.method_note || '';
    tile.appendChild(note);
    heroGrid.appendChild(tile);
  })();

  // ---- Hero 3: Reconciliation ----------------------------------------------
  (function heroReconciliation() {
    const t = data.hero_reconciliation || {};
    const tile = el('div', 'tile hero');
    tile.appendChild(el('h2', null, 'Reconciliation'));
    const badge = t.green
      ? '<span class="badge green">TIES OUT</span>'
      : '<span class="badge red">MISMATCH</span>';
    tile.appendChild(el('div', 'big-number green', `${usd(t.diff_usd)} ${badge}`));
    tile.appendChild(el('div', 'subline', t.subline || ''));
    const note = el('div', 'scale-note amber', t.scale_note || '');
    note.title = t.method_note || '';
    tile.appendChild(note);
    heroGrid.appendChild(tile);
  })();

  // ---- Tile 4: Auth -> Capture time -----------------------------------------
  (function tileAuthCapture() {
    const t = data.tile_auth_to_capture || {};
    const tile = el('div', 'tile');
    const header = el('h2', null, 'Auth → Capture Time');
    header.title = t.footnote || '';
    tile.appendChild(header);
    tile.appendChild(el('div', 'big-number amber', `${fmtMs(t.headline_p50_ms)} / ${fmtMs(t.headline_p95_ms)}`));
    const sub = el('div', 'subline', `${t.headline_service || 'n/a'} — p50 / p95`);
    sub.title = t.footnote || '';
    tile.appendChild(sub);
    const table = el('table');
    table.innerHTML = '<tr><th>Service</th><th>N</th><th>p50</th><th>p95</th></tr>';
    const rows = t.rows || [];
    const chained = rows.find(r => r.service_name === t.headline_service);
    if (chained) {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${chained.service_name}</td><td>${chained.n}</td><td>${fmtMs(chained.p50_ms)}</td><td>${fmtMs(chained.p95_ms)}</td>`;
      table.appendChild(row);
    }
    if (t.flat_n) {
      const row = document.createElement('tr');
      row.title = t.flat_services_label || '';
      row.innerHTML = `<td>5 flat services</td><td>${t.flat_n}</td><td>~0ms</td><td>~0ms</td>`;
      table.appendChild(row);
    }
    tile.appendChild(table);
    grid.appendChild(tile);
  })();

  // ---- Tile 5: Velocity checks ----------------------------------------------
  (function tileVelocity() {
    const t = data.tile_velocity_checks || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Velocity Checks'));
    const flagged = t.flagged || [];
    tile.appendChild(el('div', `big-number ${flagged.length ? 'red' : 'green'}`,
      flagged.length ? `${flagged.length} FLAGGED` : 'CLEAN'));
    const sub = el('div', 'subline', flagged.length ? `${flagged.join(', ')} — anomalously fast` : 'No agent anomalously fast vs peers');
    sub.title = 'Agent runaway = card-testing analog: peer-relative flag when median inter-call gap < 20% of the peer-agent median gap.';
    tile.appendChild(sub);
    const table = el('table');
    table.innerHTML = '<tr><th>Agent</th><th>Calls</th><th>Median gap</th><th>Peak/60s</th></tr>';
    (t.per_agent || []).slice(0, 3).forEach((a) => {
      const row = document.createElement('tr');
      if (a.runaway) row.className = 'flag-red';
      row.innerHTML = `<td>${a.agent_name}${a.runaway ? ' ●' : ''}</td><td>${a.n}</td><td>${a.median_gap_s === null || a.median_gap_s === undefined ? 'n/a' : a.median_gap_s.toFixed(2) + 's'}</td><td>${a.peak_calls_per_min ?? 'n/a'}</td>`;
      table.appendChild(row);
    });
    tile.appendChild(table);
    grid.appendChild(tile);
  })();

  // ---- Tile 6: Take rate ----------------------------------------------------
  (function tileTakeRate() {
    const t = data.tile_take_rate || {};
    const tile = el('div', 'tile');
    const header = el('h2', null, 'Take Rate');
    header.title = t.note || '';
    tile.appendChild(header);
    const sub = el('div', 'subline', 'margin observability per service');
    sub.title = t.note || '';
    tile.appendChild(sub);
    const table = el('table');
    const lk = t.linkup || {};
    const or_ = t.openrouter || {};
    table.innerHTML = `
      <tr><th>Service</th><th>Sapiom</th><th>Public</th><th>Markup</th></tr>
      <tr><td>${lk.service_label || 'Linkup search'}</td><td>${usd(lk.sapiom_price_usd)}/call</td><td>${usd(lk.public_price_usd)}/call</td><td>${pct(lk.markup_pct)}</td></tr>
      <tr><td>OpenRouter LLM</td><td>${usd(or_.sapiom_price_usd)}/call</td><td>n/a</td><td>n/a</td></tr>
    `;
    tile.appendChild(table);
    grid.appendChild(tile);
  })();

  footer.textContent = 'Static, offline viewer.';
  footer.title = 'Reads dashboard_data.js only, no network, no backend. Regenerate with: python export_dashboard.py';
})();
</script>

</body>
</html>
