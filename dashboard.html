<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sapiom Spend — CEO Dashboard</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131722;
    --panel-border: #232a3b;
    --text: #e6e9f0;
    --muted: #8a92a6;
    --green: #35d07f;
    --red: #ff5c5c;
    --amber: #ffb454;
    --blue: #5b8ff9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 32px;
  }
  h1 { font-size: 22px; margin: 0 0 4px 0; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }
  .tile {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 20px 22px;
  }
  .tile h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin: 0 0 14px 0;
  }
  .big-number { font-size: 38px; font-weight: 700; line-height: 1.1; }
  .big-number.green { color: var(--green); }
  .big-number.red { color: var(--red); }
  .big-number.amber { color: var(--amber); }
  .caption { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; }
  th, td { text-align: left; padding: 5px 6px; border-bottom: 1px solid var(--panel-border); }
  th { color: var(--muted); font-weight: 500; }
  tr.flag-red td { color: var(--red); font-weight: 600; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.green { background: rgba(53,208,127,0.15); color: var(--green); }
  .badge.red { background: rgba(255,92,92,0.15); color: var(--red); }
  .bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .bar-label { width: 70px; font-size: 12px; color: var(--muted); }
  .bar-track { flex: 1; background: #1c2231; border-radius: 4px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; }
  .footer { margin-top: 28px; color: var(--muted); font-size: 12px; }
  .error { color: var(--red); }
</style>
</head>
<body>

<h1>Sapiom Spend — CEO Dashboard</h1>
<div class="subtitle" id="subtitle">Loading...</div>

<div class="grid" id="grid"></div>

<div class="footer" id="footer"></div>

<!-- Same-directory <script src>, not fetch(): a fetch() of a local JSON file
     is blocked by CORS when this page is opened directly via file:// in
     Chrome. A plain <script src> has no such restriction, so this dashboard
     opens correctly with a simple double-click, no local server needed. -->
<script src="dashboard_data.js"></script>
<script>
(function () {
  const el = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };
  const usd = (n, d = 6) => (n === null || n === undefined) ? 'n/a' : `$${Number(n).toFixed(d)}`;
  const usd2 = (n) => usd(n, 2);
  const pct = (n, d = 1) => (n === null || n === undefined) ? 'n/a' : `${Number(n) >= 0 ? '+' : ''}${Number(n).toFixed(d)}%`;
  const fmtSeconds = (n) => (n === null || n === undefined) ? 'n/a' : `${Number(n).toFixed(2)}s`;

  const grid = document.getElementById('grid');
  const subtitle = document.getElementById('subtitle');
  const footer = document.getElementById('footer');

  const data = window.DASHBOARD_DATA;
  if (!data) {
    subtitle.textContent = '';
    grid.appendChild(el('div', 'tile error',
      '<h2>Load error</h2><div class="big-number red">n/a</div>' +
      '<div class="caption">dashboard_data.js did not load. Run export_dashboard.py from the repo root, ' +
      'then reopen dashboard.html from the same directory.</div>'));
    return;
  }

  const h = data.header || {};
  subtitle.textContent =
    `${h.n_txns} transactions · ${h.n_agents} agents · ${usd(h.live_spend_usd)} live spend · ` +
    `${h.period_start} -> ${h.period_end} · generated ${data.generated_at}`;

  // ---- Tile 1: Float meter ------------------------------------------------
  (function tileFloat() {
    const t = data.tile_float_meter || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Float Meter — Held vs Settled'));
    if (!t.available) {
      tile.appendChild(el('div', 'big-number red', 'n/a'));
      tile.appendChild(el('div', 'caption', t.note || 'extrapolation_result.json not available'));
      grid.appendChild(tile);
      return;
    }
    const ratio = t.held_over_settled_ratio;
    tile.appendChild(el('div', 'big-number amber', `${ratio ? ratio.toFixed(1) : 'n/a'}×`));
    tile.appendChild(el('div', 'caption', `Peak in-flight holds froze ${usd(t.peak_held_usd)} vs ${usd(t.settled_usd)} actually settled, under a 10-way concurrent burst (agent: ${t.agent_name}).`));
    const maxBar = Math.max(t.peak_held_usd, t.settled_usd) || 1;
    const bars = el('div');
    bars.innerHTML = `
      <div class="bar-row"><div class="bar-label">Held</div><div class="bar-track"><div class="bar-fill" style="width:${(t.peak_held_usd/maxBar*100).toFixed(0)}%;background:var(--amber)"></div></div><div>${usd(t.peak_held_usd)}</div></div>
      <div class="bar-row"><div class="bar-label">Settled</div><div class="bar-track"><div class="bar-fill" style="width:${(t.settled_usd/maxBar*100).toFixed(0)}%;background:var(--blue)"></div></div><div>${usd(t.settled_usd)}</div></div>
    `;
    tile.appendChild(bars);
    grid.appendChild(tile);
  })();

  // ---- Tile 2: Capital-efficiency ratio -----------------------------------
  (function tileEfficiency() {
    const t = data.tile_capital_efficiency || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Capital-Efficiency Ratio'));
    const pctVal = t.efficiency_ratio !== null && t.efficiency_ratio !== undefined ? t.efficiency_ratio * 100 : null;
    const cls = pctVal === null ? '' : (pctVal < 50 ? 'red' : pctVal < 80 ? 'amber' : 'green');
    tile.appendChild(el('div', `big-number ${cls}`, pctVal === null ? 'n/a' : `${pctVal.toFixed(1)}%`));
    tile.appendChild(el('div', 'caption',
      `Sigma settled / Sigma held, dollar-weighted across all ${t.n_chains} supersession chains (hold -> final capture). ` +
      `${usd(t.sum_settled_usd)} settled of ${usd(t.sum_held_usd)} originally held.`));
    grid.appendChild(tile);
  })();

  // ---- Tile 3: Reconciliation health ---------------------------------------
  (function tileReconciliation() {
    const t = data.tile_reconciliation || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Reconciliation Health'));
    const badge = t.green
      ? '<span class="badge green">TIES OUT</span>'
      : '<span class="badge red">MISMATCH</span>';
    tile.appendChild(el('div', 'big-number', `${usd(t.reconciliation_diff_usd)} ${badge}`));
    tile.appendChild(el('div', 'caption',
      `Latest balance snapshot vs (initial balance − live spend): diff ${usd(t.reconciliation_diff_usd)}. ` +
      `Naively summing every cost row (including superseded holds) would overstate spend by ${pct(t.overstatement_pct)} ` +
      `(${usd(t.naive_sum_usd)} naive vs ${usd(t.live_sum_usd)} live) — supersession chains must be filtered, not summed.`));
    grid.appendChild(tile);
  })();

  // ---- Tile 4: Runaway detection -------------------------------------------
  (function tileRunaway() {
    const t = data.tile_runaway || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Runaway Detection'));
    const flagged = t.flagged || [];
    tile.appendChild(el('div', `big-number ${flagged.length ? 'red' : 'green'}`,
      flagged.length ? `${flagged.length} FLAGGED` : 'CLEAN'));
    tile.appendChild(el('div', 'caption',
      flagged.length
        ? `Peer-relative statistical flag (median inter-call gap < 20% of peer median): ${flagged.join(', ')}.`
        : 'No agent firing anomalously faster than its peers.'));
    const table = el('table');
    table.innerHTML = '<tr><th>Agent</th><th>Calls</th><th>Median gap</th><th>Peak/60s</th></tr>';
    (t.per_agent || []).slice(0, 8).forEach((a) => {
      const row = document.createElement('tr');
      if (a.runaway) row.className = 'flag-red';
      row.innerHTML = `<td>${a.agent_name}${a.runaway ? ' ●' : ''}</td><td>${a.n}</td><td>${fmtSeconds(a.median_gap_s)}</td><td>${a.peak_calls_per_min ?? 'n/a'}</td>`;
      table.appendChild(row);
    });
    tile.appendChild(table);
    grid.appendChild(tile);
  })();

  // ---- Tile 5: Take-rate / margin strip -------------------------------------
  (function tileTakeRate() {
    const t = data.tile_take_rate || {};
    const tile = el('div', 'tile');
    tile.appendChild(el('h2', null, 'Take-Rate / Margin Strip'));
    const lk = t.linkup || {};
    tile.appendChild(el('div', 'big-number amber', pct(lk.markup_pct)));
    tile.appendChild(el('div', 'caption', `Search (Linkup): Sapiom ${usd(lk.sapiom_price_usd)}/call vs public list ${usd(lk.public_price_usd)}/call, n=${lk.n_calls}. ${lk.note || ''}`));
    const table = el('table');
    const or_ = t.openrouter || {};
    table.innerHTML = `
      <tr><th>Service</th><th>Sapiom</th><th>Public</th><th>Markup</th></tr>
      <tr><td>Linkup search</td><td>${usd(lk.sapiom_price_usd)}/call</td><td>${usd(lk.public_price_usd)}/call</td><td>${pct(lk.markup_pct)}</td></tr>
      <tr><td>OpenRouter LLM (settled)</td><td>${usd(or_.sapiom_settled_avg_usd)}/call avg</td><td>$${or_.public_output_per_1k_usd}/1k out</td><td>see note</td></tr>
    `;
    tile.appendChild(table);
    tile.appendChild(el('div', 'caption', or_.note || ''));
    grid.appendChild(tile);
  })();

  footer.textContent = 'Static viewer — reads dashboard_data.js only, no network, no backend. Regenerate with: python export_dashboard.py';
})();
</script>

</body>
</html>
